# =============================================================================
# SecretProviderClass — Key Vault CSI driver (NO workload identity)
# =============================================================================
# Uses the AKS Key Vault CSI addon's built-in system-managed identity.
# Replace the placeholders below with values from `terraform output`.
#
#   userAssignedIdentityID → terraform output kv_csi_identity_client_id
#   keyvaultName           → terraform output keyvault_name
#   tenantId               → terraform output tenant_id
# =============================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-secrets
  namespace: apps
spec:
  provider: azure
  # Sync KV secrets → K8s Secret so pods can use envFrom.secretRef
  secretObjects:
    - secretName: app-secrets-from-kv
      type: Opaque
      data:
        - objectName: python-app-secret
          key: PYTHON_APP_SECRET
        - objectName: nodejs-app-secret
          key: NODEJS_APP_SECRET
  parameters:
    # Use the CSI addon's VM-managed identity (NOT workload identity)
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Client ID of the KV CSI addon identity — from terraform output
    userAssignedIdentityID: "<REPLACE_WITH_kv_csi_identity_client_id>"
    keyvaultName: "<REPLACE_WITH_keyvault_name>"
    tenantId: "<REPLACE_WITH_tenant_id>"
    objects: |
      array:
        - |
          objectName: python-app-secret
          objectType: secret
        - |
          objectName: nodejs-app-secret
          objectType: secret
